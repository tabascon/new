name: Refresh all prices

on:
  workflow_dispatch:
    inputs:
      scheduled_slot:
        description: "Automatic slot in YYYY-MM-DDTHH:MM format"
        required: false
        type: string

concurrency:
  group: price-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v5

      - name: Refresh due admin-configured Kyiv slot
        env:
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          PRICE_COMPARE_URL: https://new-4zc.pages.dev
          REFRESH_WORKERS: "6"
          SCHEDULED_SLOT: ${{ inputs.scheduled_slot || '' }}
          FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' && inputs.scheduled_slot == '' && 'true' || 'false' }}
        run: python3 -u scripts/auto_refresh.py
