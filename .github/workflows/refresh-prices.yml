name: Refresh all prices

on:
  schedule:
    # Frequent off-peak checks make the 12:00/17:00 refresh resilient to
    # GitHub scheduler delays. The script runs each Kyiv slot only once.
    - cron: "7,22,37,52 * * * *"
      timezone: "Europe/Kyiv"
  workflow_dispatch:

concurrency:
  group: price-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v5

      - name: Refresh due 12:00 or 17:00 Kyiv slot
        env:
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          PRICE_COMPARE_URL: https://new-4zc.pages.dev
          REFRESH_WORKERS: "6"
          FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python3 -u scripts/auto_refresh.py
