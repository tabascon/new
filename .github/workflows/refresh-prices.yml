name: Refresh all prices

on:
  schedule:
    - cron: "0 10,14,18 * * *"
      timezone: "Europe/Kyiv"
    - cron: "3 10,14,18 * * *"
      timezone: "Europe/Kyiv"
    - cron: "8 10,14,18 * * *"
      timezone: "Europe/Kyiv"
  workflow_dispatch:

concurrency:
  group: price-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v5

      - name: Refresh due admin-configured Kyiv slot
        env:
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          PRICE_COMPARE_URL: https://new-4zc.pages.dev
          REFRESH_WORKERS: "6"
          FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python3 -u scripts/auto_refresh.py
