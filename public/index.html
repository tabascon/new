<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Price Compare</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand"><span class="mark">AI</span><span>Price Compare</span></div>
      <nav class="nav">
        <button id="view-table" class="nav-link active" type="button">Таблиця</button>
        <button id="view-admin" class="nav-link" type="button">Адмінка</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="toolbar">
      <div>
        <h1 id="page-title">Порівняння цін</h1>
        <div id="page-meta" class="meta"></div>
      </div>
      <div class="actions">
        <button id="save-button" class="button primary hidden" type="button">Зберегти</button>
        <button id="refresh-all-button" class="button hidden" type="button">Оновити ціни</button>
        <button id="download-button" class="button green" type="button">Скачати XLSX</button>
      </div>
    </section>

    <section id="progress" class="progress-panel">
      <div class="progress-top">
        <span>Оновлення цін</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
      <div id="progress-detail" class="progress-detail">Очікування...</div>
    </section>

    <section id="notice" class="notice hidden"></section>

    <section class="filter-panel">
      <div class="filter-grid">
        <label>
          <span>Пошук</span>
          <input id="table-search" type="text" placeholder="Назва або URL">
        </label>
        <label>
          <span>Фільтр</span>
          <select id="table-filter">
            <option value="all">Всі товари</option>
            <option value="mygadget-cheaper">MyGadget дешевший</option>
            <option value="jabko-cheaper">Jabko дешевший</option>
            <option value="missing-mygadget-url">Без MyGadget URL</option>
            <option value="missing-price">Без ціни</option>
            <option value="problem">Проблемні рядки</option>
          </select>
        </label>
        <label>
          <span>Сортування</span>
          <select id="table-sort">
            <option value="default">Як у таблиці</option>
            <option value="diff-desc">Відхилення: більше зверху</option>
            <option value="diff-asc">Відхилення: менше зверху</option>
            <option value="diff-abs">Найбільша різниця</option>
            <option value="name">Назва A-Z</option>
          </select>
        </label>
      </div>
      <div id="filter-meta" class="filter-meta"></div>
    </section>

    <div id="sections"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
